{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    <div class="post-meta-row">
      <time class="post-meta-time" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
        {{ .Date.Format "2006-01-02 15:04" }}
      </time>
      <a class="post-back-link" href="{{ "/" | relURL }}">{{ T "backToPosts" }}</a>
    </div>
    <div class="post-body">
      {{ .Content }}
    </div>
  </article>
{{ end }}

{{ define "scripts" }}
  <script type="module" src="{{ "js/media/gallery.js" | relURL }}"></script>
  <script src="{{ "js/posts/back-link.js" | relURL }}" defer></script>
{{ end }}
