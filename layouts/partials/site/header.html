<header class="site-header">
  <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
  {{ with .Site.Params.headerLink }}
    {{ $url := .url | default .URL }}
    {{ $label := .name | default .title | default $url }}
    {{ if $url }}
      <a href="{{ $url }}" class="header-link">{{ $label }}</a>
    {{ end }}
  {{ end }}
</header>
